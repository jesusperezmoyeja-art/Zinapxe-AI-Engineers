<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Mensualidades | CENFORPRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Fondo general de la página (Azul oscuro/Grisáceo) */
        body {
            background-color: #1e222b; 
            color: #ffffff;
        }
        
        /* Estilo de la tarjeta del formulario */
        .card {
            background-color: #272d38; /* Un tono un poco más claro para que resalte */
            border: 1px solid #3c4454;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        /* Cabecera de la tarjeta con el naranja corporativo */
        .card-header {
            background-color: #f37021 !important; 
            color: #ffffff;
            border-top-left-radius: 11px !important;
            border-top-right-radius: 11px !important;
            border-bottom: none;
            padding: 1rem;
        }

        /* Color de los textos pequeños y etiquetas */
        .text-muted {
            color: #aeb5c0 !important;
        }
        label {
            color: #e2e8f0;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        /* Botón personalizado Naranja */
        .btn-naranja {
            background-color: #f37021;
            color: #ffffff;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            padding: 10px;
            transition: all 0.3s ease;
        }
        .btn-naranja:hover {
            background-color: #d9621b; /* Naranja un poco más oscuro al pasar el mouse */
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* Título en color amarillo (como el de la Universidad de Carabobo) */
        .titulo-amarillo {
            color: #ffd13b;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <div class="card">
                <div class="card-header text-center">
                    <h4 class="mb-0 fw-bold">Reporte de Pago</h4>
                </div>
                <div class="card-body p-4">
                    <h5 class="text-center titulo-amarillo fw-bold mb-2">Diplomado en IA</h5>
                    <p class="text-muted text-center mb-4 pb-2 border-bottom border-secondary">Ingresa tu cédula y los datos del pago móvil para registrar tu mensualidad.</p>
                    
                    <form method="POST" action="">
                        {% csrf_token %}
                        
                        {{ form.as_p }}
                        
                        <div class="d-grid mt-4 pt-2">
                            <button type="submit" class="btn btn-naranja text-uppercase">Registrar Mensualidad</button>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
