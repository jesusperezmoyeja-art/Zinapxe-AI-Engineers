<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Diplomado IA Generativa</title>
    <link rel="stylesheet" href="styles1.css">
    <style>
        /* Estilo temporal para ocultar el contenido hasta que cargue la imagen */
        .welcome-overlay { opacity: 0; transition: opacity 0.5s ease; }
        .loaded .welcome-overlay { opacity: 1; }
    </style>
</head>
<body class="bg-tech">
    <div class="welcome-overlay">
        <div class="welcome-card">
            <div class="logos-welcome">
                <img src="universidad-de-carabobo-logo-png_seeklogo-535325.png" alt="UC Logo">
                <img src="Zynaoxe.png" alt="Zynapxe Logo">
                <img src="cenforpro.png" alt="Cenforpro Logo">
            </div>
            <h1>Diplomado en IA Generativa</h1>
            <h2>Estrategias, Implementación y Marco Legal</h2>
            <a href="bienvenida.html" class="btn-enter">Iniciar Inscripción</a>
        </div>
    </div>
    <script>
        // Script para precargar la imagen de fondo y asegurar una animación fluida
        window.addEventListener('load', function() {
            const bgImageUrl = 'WhatsApp Image 2026-03-21 at 2.39.12 PM.jpeg';
            const img = new Image();
            img.src = bgImageUrl;
            img.onload = function() {
                // Una vez cargada la imagen de fondo, mostramos el contenido con fade-in
                document.body.classList.add('loaded');
            };
        });
    </script>
</body>
</html>
